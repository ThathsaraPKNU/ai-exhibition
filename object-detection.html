<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eye | Selective Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon-green: #39ff14; --dark: #050505; --yellow: #ffdd57; }
        body { margin: 0; background: var(--dark); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .header { background: var(--yellow); color: #000; width: 100%; text-align: center; padding: 10px 0; font-weight: 900; }
        #container { position: relative; width: 90vw; height: 60vh; border: 3px solid #333; border-radius: 20px; overflow: hidden; margin-top: 15px; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .info { margin-top: 20px; font-size: 24px; color: var(--yellow); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">🌸 කීමේ අවුරුදු උත්සවය - 2026 🌸</div>
    <h2 style="color: var(--neon-green);">AI ඇස: භාණ්ඩ හඳුනාගැනීම</h2>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="info" id="label">කැමරාව යොමු කරන්න...</div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const label = document.getElementById('label');

        // මෙහි ඇතුළත් කර ඇති භාණ්ඩ පමණක් හඳුනා ගනී (Selective List)
        const selectedItems = {
            'cell phone': 'ජංගම දුරකථනය 📱',
            'bottle': 'බෝතලය 🍼',
            'backpack': 'බෑගය 🎒',
            'cup': 'කෝප්පය ☕',
            'chair': 'පුටුව 🪑',
            'laptop': 'ලැප්ටොප් එක 💻',
            'mouse': 'මවුස් එක 🖱️',
            'keyboard': 'යතුරුපුවරුව ⌨️',
            'remote': 'රිමෝට් එක 📺',
            'book': 'පොත 📖'
        };

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            const model = await cocoSsd.load();
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                run(model);
            };
        }

        async function run(model) {
            const predictions = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            predictions.forEach(p => {
                // භාණ්ඩය අපේ "Selected List" එකේ තියෙනවාදැයි පරීක්ෂා කිරීම
                if (p.score > 0.6 && selectedItems[p.class]) {
                    const [x, y, w, h] = p.bbox;
                    const sinhalaName = selectedItems[p.class];

                    ctx.strokeStyle = "#39ff14";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x, y, w, h);

                    ctx.fillStyle = "#39ff14";
                    ctx.font = "bold 25px Arial";
                    ctx.fillText(sinhalaName, x, y > 30 ? y - 10 : 30);

                    label.innerText = sinhalaName;
                }
            });
            requestAnimationFrame(() => run(model));
        }
        init();
    </script>
</body>
</html>
