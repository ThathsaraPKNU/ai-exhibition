<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>කිමේ පූර්ව AI කානාමුට්ටි 3 අභියෝගය</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root { --neon-gold: #ffcc00; --neon-blue: #00f2ff; --dark: #0a0a0a; }
        body { 
            margin: 0; background: var(--dark); color: #fff; 
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; overflow: hidden; height: 100vh;
        }

        .header { text-align: center; padding: 10px; width: 100%; background: #000; z-index: 50; border-bottom: 2px solid #222;}
        .title { font-size: 1.3rem; color: var(--neon-gold); font-weight: 900; margin: 0; }

        #game-area {
            position: relative; width: 100vw; height: 70vh;
            background: #000; overflow: hidden;
            display: flex; justify-content: space-around; align-items: flex-start;
        }

        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .pot-wrapper { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; margin-top: 15%; }
        .rope { width: 3px; height: 50px; background: #654321; }
        .pot {
            width: 100px; height: 100px;
            background: url('muttiya.png') no-repeat center;
            background-size: contain; transition: 0.1s;
        }
        .shaking { animation: shake 1s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
        
        /* Water Splash Effect */
        .splash {
            position: absolute; top: 50px; width: 120px; height: 120px;
            border-radius: 50%; display: none; pointer-events: none;
            filter: blur(5px); animation: splashAnim 0.6s ease-out forwards;
        }
        @keyframes splashAnim {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .broken { transform: scale(0); opacity: 0; transition: 0.4s; }

        #stick {
            position: absolute; width: 12px; height: 180px;
            background: linear-gradient(to top, #5d4037 0%, #ffcc00 100%);
            border-radius: 6px; box-shadow: 0 0 15px var(--neon-gold);
            display: none; pointer-events: none; z-index: 100; transform-origin: center 90%; 
        }

        .ui-box { padding: 15px; text-align: center; z-index: 20; background: #000; width: 100%; flex-grow: 1; border-top: 2px solid #222;}
        #msg { font-size: 1.2rem; font-weight: bold; color: var(--neon-blue); }
        .footer { font-size: 0.75rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">කිමේ පූර්ව Online AI අවුරුදු ක්‍රීඩා 02</div>
        <div style="font-size: 0.8rem; color: #ff4d4d;">රතු වතුර පිරුණු වාසනාවන්ත මුට්ටිය බිඳින්න! 🩸</div>
    </div>

    <div id="game-area">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <div id="stick"></div>
        
        <div class="pot-wrapper" id="wrap-0">
            <div class="rope"></div>
            <div class="pot shaking" id="pot-0"></div>
            <div class="splash" id="splash-0"></div>
        </div>
        <div class="pot-wrapper" id="wrap-1">
            <div class="rope"></div>
            <div class="pot shaking" id="pot-1"></div>
            <div class="splash" id="splash-1"></div>
        </div>
        <div class="pot-wrapper" id="wrap-2">
            <div class="rope"></div>
            <div class="pot shaking" id="pot-2"></div>
            <div class="splash" id="splash-2"></div>
        </div>
    </div>

    <div class="ui-box">
        <div id="msg">කැමරාවට අත පෙන්වන්න...</div>
        <div class="footer">POWERED BY <b>VECTOR LABS AI & E9 SHOP</b></div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const stick = document.getElementById('stick');
        const msg = document.getElementById('msg');
        
        let winningPot = Math.floor(Math.random() * 3); 
        let gameActive = true;
        let lastY = 0;

        function onResults(results) {
            if (!gameActive || !results.poseLandmarks) {
                if(!gameActive) stick.style.display = 'none';
                return;
            }

            const wrist = results.poseLandmarks[16]; 
            const elbow = landmarks = results.poseLandmarks[14]; 

            if (wrist && elbow) {
                stick.style.display = 'block';
                const x = (1 - wrist.x) * window.innerWidth;
                const y = wrist.y * (window.innerHeight * 0.7);
                const ex = (1 - elbow.x) * window.innerWidth;
                const ey = elbow.y * (window.innerHeight * 0.7);

                const angle = (Math.atan2(y - ey, x - ex) * 180 / Math.PI) + 90;
                stick.style.left = `${x - 6}px`;
                stick.style.top = `${y - 160}px`;
                stick.style.transform = `rotate(${angle}deg)`;

                const velocity = y - lastY;
                lastY = y;

                for (let i = 0; i < 3; i++) {
                    const pot = document.getElementById(`pot-${i}`);
                    if (pot.classList.contains('broken')) continue;

                    const pr = pot.getBoundingClientRect();
                    const sr = stick.getBoundingClientRect();

                    if (!(sr.right < pr.left || sr.left > pr.right || sr.bottom < pr.top || sr.top > pr.bottom) && velocity > 30) {
                        handleBreak(i);
                    }
                }
            }
        }

        function handleBreak(id) {
            const pot = document.getElementById(`pot-${id}`);
            const splash = document.getElementById(`splash-${id}`);
            
            pot.classList.add('broken');
            splash.style.display = 'block';

            if (id === winningPot) {
                // රතු වතුර (Red Water)
                splash.style.background = 'radial-gradient(circle, #ff0000 0%, rgba(255,0,0,0) 70%)';
                gameActive = false;
                msg.innerText = "🏆 සුපිරි! ඔබ රතු වතුර මුට්ටිය බිඳ ජයග්‍රහණය කළා! 🥇";
                msg.style.color = "#ff4d4d";
                setTimeout(() => { if(confirm("Winner! නැවත සෙල්ලම් කරමුද?")) location.reload(); }, 3000);
            } else {
                // සාමාන්‍ය නිල් වතුර (Normal Blue Water)
                splash.style.background = 'radial-gradient(circle, #00f2ff 0%, rgba(0,242,255,0) 70%)';
                msg.innerText = "නිකන් වතුර! 💧 අනෙක් මුට්ටිය උත්සාහ කරන්න!";
                msg.style.color = "#00f2ff";
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        pose.onResults(onResults);
        new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480 }).start();
    </script>
</body>
</html>
