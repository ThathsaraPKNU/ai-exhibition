<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detection</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; }
        .header { background: #1f1f1f; padding: 20px; border-bottom: 3px solid #00d1b2; }
        video { width: 90%; max-width: 600px; border-radius: 10px; margin-top: 20px; transform: scaleX(-1); background: #222; }
        #container { position: relative; display: inline-block; }
        canvas { position: absolute; left: 0; top: 20px; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI හැඟීම් හඳුනාගැනීමේ පද්ධතිය</h1>
        <p>නිර්මාණය: Indunil Samayamanthtree</p>
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.roboflow.com/0.2.26/roboflow.js"></script>
    <script>
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const MY_API_KEY = "vmu1oR7ZaUWJRFP7zeLC"; 
        const MY_MODEL_ID = "emotion-zjj8h/1"; 

        const emotionSinhala = { "0": "සතුටුයි 😊", "1": "කණගාටුයි 😔", "2": "පුදුමයි 😲", "3": "තරහෙන් 😡", "4": "සාමාන්‍යයි 😐" };

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startAI();
                };
            }).catch(err => alert("කැමරාව වැඩ කරන්නේ නැත: " + err));

        function startAI() {
            roboflow.auth({ publishable_key: MY_API_KEY }).load({ model: MY_MODEL_ID, version: 1 })
                .then(model => {
                    console.log("AI Model Ready!");
                    setInterval(() => {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            predictions.forEach(p => {
                                ctx.strokeStyle = "#00d1b2";
                                ctx.lineWidth = 5;
                                ctx.strokeRect(p.bbox.x, p.bbox.y, p.bbox.width, p.bbox.height);
                                ctx.fillStyle = "#00d1b2";
                                ctx.font = "bold 30px Arial";
                                ctx.fillText(emotionSinhala[p.class] || p.class, p.bbox.x, p.bbox.y - 10);
                            });
                        });
                    }, 200);
                });
        }
    </script>
</body>
</html>
