<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Emotion Detection</title>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        .header { background: #222; padding: 10px; border-bottom: 2px solid #00d1b2; }
        video { width: 100%; max-width: 600px; transform: scaleX(-1); border-radius: 10px; margin-top: 10px; }
        canvas { position: absolute; left: 50%; transform: translateX(-50%) scaleX(-1); top: 85px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2>AI හැඟීම් හඳුනාගැනීම</h2>
        <p>නිර්මාණය: Indunil Samayamanthtree</p>
    </div>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.roboflow.com/0.2.26/roboflow.js"></script>
    <script>
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const MY_API_KEY = "rf_4tlgDCsTcah7rsFZTkKONHC3TXO2";
        const MY_MODEL_ID = "emotion-zjj8h/1";
        const emotions = { "0": "සතුටුයි 😊", "1": "කණගාටුයි 😔", "2": "පුදුමයි 😲", "3": "තරහෙන් 😡", "4": "සාමාන්‍යයි 😐" };

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startAI();
                };
            });

        function startAI() {
            roboflow.auth({ publishable_key: MY_API_KEY }).load({ model: MY_MODEL_ID, version: 1 })
                .then(model => {
                    setInterval(() => {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            predictions.forEach(p => {
                                ctx.strokeStyle = "#00d1b2";
                                ctx.lineWidth = 4;
                                ctx.strokeRect(p.bbox.x, p.bbox.y, p.bbox.width, p.bbox.height);
                                ctx.fillStyle = "#00d1b2";
                                ctx.font = "bold 30px Arial";
                                ctx.fillText(emotions[p.class] || p.class, p.bbox.x, p.bbox.y - 10);
                            });
                        });
                    }, 200);
                });
        }
    </script>
</body>
</html>
