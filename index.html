<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finger Counter - Vector Lab AI</title>
    <style>
        body { margin: 0; background: #000; color: #00d1b2; text-align: center; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid #00d1b2; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #wrapper { position: relative; display: inline-block; margin-top: 15px; border-radius: 15px; border: 4px solid #1a1a1a; overflow: hidden; background: #000; }
        video { width: 100%; max-width: 640px; transform: scaleX(-1); display: block; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .footer { margin-top: 10px; font-size: 16px; color: #fff; font-weight: bold; }
        .sponsor { font-size: 14px; color: #888; margin-top: 5px; }
        .ai-quote { font-style: italic; color: #00d1b2; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; letter-spacing: 1px;">AI FINGER COUNTER</h2>
        <p class="sponsor">Presents by : Vector Lab AI & E9 Shop</p>
    </div>

    <div id="wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="footer">
        <p class="ai-quote">"AI can now see and count like a human eye!"</p>
        <div id="count-text" style="font-size: 40px; color: #ffdd57;">අත කැමරාවට පෙන්වන්න...</div>
    </div>

    <script src="https://cdn.roboflow.com/0.2.26/roboflow.js"></script>
    <script>
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const countDisplay = document.getElementById("count-text");

        const MY_API_KEY = "rf_4tlgDCsTcah7rsFZTkKONHC3TXO2"; 
        const MY_MODEL_ID = "finger-count"; 
        const MY_VERSION = 2;

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: 640, height: 480 } 
        })
        .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                startAI();
            };
        });

        function startAI() {
            roboflow.auth({ publishable_key: MY_API_KEY })
                .load({ model: MY_MODEL_ID, version: MY_VERSION })
                .then(model => {
                    setInterval(() => {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            
                            if (predictions.length > 0) {
                                // වැඩිම විශ්වාසයක් ඇති Prediction එක තෝරාගනී
                                let topPred = predictions.sort((a,b) => b.confidence - a.confidence)[0];
                                
                                predictions.forEach(p => {
                                    if(p.confidence > 0.4) {
                                        // අත වටා කොටුව ඇඳීම
                                        ctx.strokeStyle = "#00d1b2";
                                        ctx.lineWidth = 6;
                                        ctx.strokeRect(p.bbox.x, p.bbox.y, p.bbox.width, p.bbox.height);
                                        
                                        // අංකය ඇඳීම
                                        ctx.fillStyle = "#00d1b2";
                                        ctx.font = "bold 45px Arial";
                                        ctx.fillText(p.class, p.bbox.x, p.bbox.y - 15);
                                    }
                                });

                                if(topPred.confidence > 0.4) {
                                    countDisplay.innerHTML = "අතේ ඇඟිලි ගණන: " + topPred.class;
                                }
                            } else {
                                countDisplay.innerHTML = "කැමරාවට අත පෙන්වන්න";
                            }
                        });
                    }, 200);
                });
        }
    </script>
</body>
</html>
