<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Emotion Detection</title>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; }
        .header { background: #222; padding: 10px; border-bottom: 2px solid #00d1b2; position: relative; z-index: 10; }
        #wrapper { position: relative; display: inline-block; margin-top: 10px; }
        video { width: 100%; max-width: 640px; transform: scaleX(-1); border-radius: 10px; display: block; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:5px;">AI හැඟීම් හඳුනාගැනීම</h2>
        <p style="margin:5px; font-size: 14px; color: #00d1b2;">නිර්මාණය: Indunil Samayamanthtree</p>
    </div>

    <div id="wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.roboflow.com/0.2.26/roboflow.js"></script>
    <script>
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const MY_API_KEY = "rf_4tlgDCsTcah7rsFZTkKONHC3TXO2";
        const MY_MODEL_ID = "emotion-zjj8h"; // Version එක පහළින් ලබා දෙයි
        const emotions = { "0": "සතුටුයි 😊", "1": "කණගාටුයි 😔", "2": "පුදුමයි 😲", "3": "තරහෙන් 😡", "4": "සාමාන්‍යයි 😐" };

        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startAI();
                };
            });

        function startAI() {
            roboflow.auth({ publishable_key: MY_API_KEY })
                .load({ model: MY_MODEL_ID, version: 1 })
                .then(model => {
                    console.log("Model loaded!");
                    setInterval(() => {
                        // Confidence 40% ට වඩා වැඩි දත්ත පමණක් ලබා ගනී
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            predictions.forEach(p => {
                                if(p.confidence > 0.4) { 
                                    ctx.strokeStyle = "#00d1b2";
                                    ctx.lineWidth = 6;
                                    ctx.strokeRect(p.bbox.x, p.bbox.y, p.bbox.width, p.bbox.height);
                                    
                                    ctx.fillStyle = "#00d1b2";
                                    ctx.font = "bold 35px Arial";
                                    const text = emotions[p.class] || p.class;
                                    ctx.fillText(text, p.bbox.x, p.bbox.y - 15);
                                }
                            });
                        });
                    }, 250);
                });
        }
    </script>
</body>
</html>
