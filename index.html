<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detection - Indunil</title>
    <style>
        body { margin: 0; background: #000; color: #00d1b2; text-align: center; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 3px solid #00d1b2; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #wrapper { position: relative; display: inline-block; margin-top: 15px; border-radius: 12px; border: 4px solid #1a1a1a; overflow: hidden; }
        video { width: 100%; max-width: 640px; transform: scaleX(-1); display: block; }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        .footer { margin-top: 10px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; letter-spacing: 1px;">AI EMOTION DETECTOR</h2>
        <p style="margin:5px; color: #fff; font-size: 14px;">නිර්මාණය: Indunil Samayamanthtree</p>
    </div>

    <div id="wrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="footer">කැමරාවට මුහුණ පෙන්වන්න | Show your face to the camera</div>

    <script src="https://cdn.roboflow.com/0.2.26/roboflow.js"></script>
    <script>
        const video = document.getElementById("webcam");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // ඔබේ තොරතුරු (ඔබේ නව Model එක අනුව)
        const MY_API_KEY = "rf_4tlgDCsTcah7rsFZTkKONHC3TXO2"; 
        const MY_MODEL_ID = "facial-emotion-recognition"; // uni-o612z ව්‍යාපෘතිය
        const MY_VERSION = 2;

        // Dataset එකට අනුව Classes (සිංහල සහ ඉංග්‍රීසි භාෂා දෙකෙන්ම)
        const emotions = { 
            "angry": "ANGRY 😡 තරහෙන්", 
            "happy": "HAPPY 😊 සතුටින්", 
            "sad": "SAD 😔 කණගාටුයි",
            "neutral": "NEUTRAL 😐 සාමාන්‍යයි",
            "surprise": "SURPRISE 😲 පුදුමයි",
            "fear": "FEAR 😨 බයෙන්",
            "disgust": "DISGUST 🤮 අප්‍රසන්න"
        };

        // ජංගම දුරකථනයේ ඉදිරිපස කැමරාව (facingMode: "user") සක්‍රිය කිරීම
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user", 
                width: { ideal: 640 }, 
                height: { ideal: 480 } 
            } 
        })
        .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                startAI();
            };
        })
        .catch(err => {
            console.error("Camera Error:", err);
            alert("කැමරාව ලබා ගැනීමට නොහැක. කරුණාකර අවසර ලබා දෙන්න.");
        });

        function startAI() {
            console.log("Roboflow Loading...");
            roboflow.auth({ publishable_key: MY_API_KEY })
                .load({ model: MY_MODEL_ID, version: MY_VERSION })
                .then(model => {
                    console.log("Model Loaded Successfully!");
                    setInterval(() => {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            
                            predictions.forEach(p => {
                                // Confidence මට්ටම 40% ට වැඩි නම් පමණක් පෙන්වන්න
                                if(p.confidence > 0.40) { 
                                    // කොටුව ඇඳීම
                                    ctx.strokeStyle = "#00d1b2";
                                    ctx.lineWidth = 6;
                                    ctx.strokeRect(p.bbox.x, p.bbox.y, p.bbox.width, p.bbox.height);

                                    // පසුබිම සහිත ලේබලය ඇඳීම
                                    const label = emotions[p.class] || p.class;
                                    ctx.font = "bold 28px Arial";
                                    const textWidth = ctx.measureText(label).width;
                                    
                                    ctx.fillStyle = "#00d1b2";
                                    ctx.fillRect(p.bbox.x, p.bbox.y - 45, textWidth + 12, 40);
                                    
                                    ctx.fillStyle = "#000";
                                    ctx.fillText(label, p.bbox.x + 6, p.bbox.y - 15);
                                }
                            });
                        });
                    }, 200); 
                })
                .catch(err => console.error("Model Loading Error:", err));
        }
    </script>
</body>
</html>
