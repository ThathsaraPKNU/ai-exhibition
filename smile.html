<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smile Expert | 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f2ff;
            --gold: #ffdd57;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', 'Identity-Sinhala', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Festival Header */
        .main-header {
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            color: #000;
            width: 100%;
            text-align: center;
            padding: 12px 0;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(255, 204, 0, 0.5);
            letter-spacing: 1px;
        }

        .sub-header {
            margin: 15px 0 5px 0;
            font-size: 14px;
            color: #ccc;
            letter-spacing: 2px;
        }

        .highlight-title {
            font-size: 19px;
            color: var(--neon-blue);
            text-align: center;
            margin: 5px 15px 15px 15px;
            font-weight: 700;
            line-height: 1.4;
        }

        /* Round Camera Viewport */
        #viewport {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 6px solid var(--neon-blue);
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3);
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Results Area */
        .result-container {
            width: 85%;
            margin-top: 20px;
            text-align: center;
        }

        #smile-percent {
            font-size: 55px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
            margin: 0;
        }

        #message {
            font-size: 18px;
            color: var(--gold);
            font-weight: bold;
            margin-top: 5px;
            min-height: 25px;
        }

        /* Branding Footer */
        .footer-branding {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
        }

        .presented-by {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-logos {
            font-size: 16px;
            font-weight: bold;
            color: #aaa;
        }

        .brand-logos span { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="main-header">🌸 කීමේ බක්මහ උළෙල - 2026 🌸</div>
    
    <div class="sub-header">AI EXPERT OPINION</div>
    <div class="highlight-title">ඔබේ සිනහව කොච්චර වටිනවද? <br>අපේ AI විශේෂඥයාගෙන් අහලා බලමුද?</div>

    <div id="viewport">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="result-container">
        <div id="smile-percent">0%</div>
        <div id="message">මුහුණ පෙන්වන්න...</div>
    </div>

    <div class="footer-branding">
        <div class="presented-by">Presented by</div>
        <div class="brand-logos">VECTOR LABS AI <span>×</span> E9 SHOP</div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const smilePercent = document.getElementById("smile-percent");
        const message = document.getElementById("message");

        let faceLandmarker;
        let lastVideoTime = -1;

        async function setupAI() {
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                startCamera();
            } catch (e) {
                message.innerText = "පද්ධතිය පණගැන්වීමේ දෝෂයකි.";
            }
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
        }

        async function predictWebcam() {
            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, startTimeMs);

                if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
                    const shapes = results.faceBlendshapes[0].categories;
                    const smileLeft = shapes.find(s => s.categoryName === "mouthSmileLeft").score;
                    const smileRight = shapes.find(s => s.categoryName === "mouthSmileRight").score;
                    
                    let smileScore = ((smileLeft + smileRight) / 2) * 100;
                    // Scale it to make it more sensitive
                    smileScore = Math.min(100, Math.max(0, smileScore * 1.4)); 

                    updateUI(Math.round(smileScore));
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function updateUI(score) {
            smilePercent.innerText = score + "%";

            if (score < 15) {
                message.innerText = "AI විශේෂඥයා බලන් ඉන්නවා... හිනාවෙන්න! 😊";
                message.style.color = "#888";
            } else if (score < 50) {
                message.innerText = "ඔයාට මීට වඩා ලස්සනට හිනාවෙන්න පුළුවන්! 😍";
                message.style.color = "#00f2ff";
            } else if (score < 85) {
                message.innerText = "නියමයි! ඒක හරිම ආකර්ෂණීය සිනහවක්. 🌟";
                message.style.color = "#ffdd57";
            } else {
                message.innerText = "විස්මිතයි! ඔබ තමයි අද දවසේ සිනහව රජා! 🏆";
                message.style.color = "#ff007f";
            }
        }

        setupAI();
    </script>
</body>
</html>
