<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Elephant Game | Bakmaha 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    
    <style>
        :root {
            --gold: #ffdd57;
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', 'Identity-Sinhala', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        /* Festival Header */
        .main-header {
            background: var(--gold);
            color: #000;
            width: 100%;
            text-align: center;
            padding: 12px 0;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(255, 221, 87, 0.4);
        }

        .highlight-title {
            font-size: 18px;
            color: var(--neon-green);
            margin: 15px 0 5px 0;
            font-weight: bold;
        }

        /* Game Area with your Elephant Image */
        #game-area {
            position: relative;
            width: 700px;
            height: 500px;
            margin: 10px auto;
            background: #fff url('image_3.png') no-repeat center;
            background-size: contain;
            border: 5px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            cursor: none; /* Mouse Cursor එක සඟවන්න */
        }

        /* Target Point (අලියාගේ ඇස තිබිය යුතු තැන) */
        #target {
            position: absolute;
            width: 18px;
            height: 18px;
            background: rgba(255, 0, 0, 0.4);
            border-radius: 50%;
            top: 295px; /* image_3.png හි ඇස ඇති තැනට අනුව සකසා ඇත */
            left: 505px;
            border: 2px dashed red;
            transition: background 0.2s ease;
        }

        /* Moving Eye Cursor (ඇඟිල්ල සමඟ යන ඇස) */
        #eye-cursor {
            position: absolute;
            width: 40px;
            height: 40px;
            background: url('https://cdn-icons-png.flaticon.com/512/595/595053.png') no-repeat center;
            background-size: contain;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            transition: transform 0.1s ease-out;
        }

        /* Game Status/Message */
        .game-status {
            text-align: center;
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
            color: var(--gold);
            min-height: 30px;
        }

        #pts-display { color: var(--neon-green); font-size: 16px; margin-top: 5px; }

        /* Restart Button */
        #restart-btn {
            display: none;
            padding: 10px 25px;
            background: var(--neon-green);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }

        /* Hidden Webcam for Tracking */
        #webcam { display: none; }
        
        .footer-branding { position: absolute; bottom: 15px; font-size: 11px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="main-header">🌸 කීමේ බක්මහ උළෙල - 2026 | AI අලියාට ඇස තැබීම 🐘</div>
    
    <div class="highlight-title">දබර ඇඟිල්ල ඔසවා "ඇස" නියම තැනට ගෙන යන්න!</div>

    <div id="game-area">
        <div id="target"></div>
        <div id="eye-cursor"></div>
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div class="game-status" id="status">පද්ධතිය පණගැන්වෙමින් පවතී...</div>
    <div id="pts-display">ලකුණු: <span id="pts-value">0</span></div>

    <button id="restart-btn" onclick="location.reload()">නැවත සෙල්ලම් කරන්න 🔄</button>

    <div class="footer-branding">Presented by VECTOR LABS AI × E9 SHOP</div>

    <script type="module">
        const eyeCursor = document.getElementById('eye-cursor');
        const target = document.getElementById('target');
        const status = document.getElementById('status');
        const ptsValue = document.getElementById('pts-value');
        const gameArea = document.getElementById('game-area');
        const restartBtn = document.getElementById('restart-btn');

        let successCounter = 0;
        let isGameWon = false;

        function onResults(results) {
            if (isGameWon || !results.multiHandLandmarks) return;
            
            status.innerText = "දබර ඇඟිල්ලෙන් ඇස නියම තැනට ගෙන යන්න...";

            if (results.multiHandLandmarks.length > 0) {
                // දබර ඇඟිල්ලේ කෙළවර (Index Finger Tip - Point 8)
                const indexTip = results.multiHandLandmarks[0][8];

                // Screen coordinates වලට හැරවීම (Mirror view නිසා 1-x ගනී)
                const x = (1 - indexTip.x) * gameArea.offsetWidth;
                const y = indexTip.y * gameArea.offsetHeight;

                // Moving Eye එක චලනය කිරීම
                eyeCursor.style.left = `${x - 20}px`;
                eyeCursor.style.top = `${y - 20}px`;

                checkCollision(x, y);
            } else {
                eyeCursor.style.display = "none";
            }
        }

        function checkCollision(x, y) {
            // Target එකේ මැද ලක්ෂ්‍යය (Relative to game-area)
            const tx = target.offsetLeft + 9; // Target width/2
            const ty = target.offsetTop + 9;  // Target height/2

            // ඇඟිල්ල සහ target එක අතර දුර මැනීම (Distance calculation)
            const dist = Math.sqrt(Math.pow(x - tx, 2) + Math.pow(y - ty, 2));

            if (dist < 28) { // ඇසට ආසන්නව ඇති විට (Collision zone)
                successCounter++;
                target.style.background = "rgba(0, 255, 0, 0.5)";
                ptsValue.innerText = successCounter;

                if (successCounter > 45) { // තත්පර 1.5ක් පමණ ස්ථාවරව තබාගත යුතුය
                    isGameWon = true;
                    status.innerHTML = "🎉 ජයග්‍රහණය කළා! නිවැරදිව ඇස තැබුවා! 🏆";
                    status.style.color = "#39ff14";
                    target.style.background = "rgba(0, 255, 0, 0.7)";
                    restartBtn.style.display = "block";
                    eyeCursor.style.display = "none"; // ජයග්‍රහණය කළ පසු cursor එක සඟවන්න
                }
            } else {
                successCounter = 0;
                ptsValue.innerText = "0";
                target.style.background = "rgba(255, 0, 0, 0.4)";
                eyeCursor.style.display = "block";
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('webcam'), {
            onFrame: async () => {
                await hands.send({image: document.getElementById('webcam')});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
