<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Elephant Game | 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    
    <style>
        :root { --gold: #ffcc00; --neon: #39ff14; --dark: #050505; }
        
        body { 
            margin: 0; background: var(--dark); color: #fff; 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        .main-header {
            background: var(--gold); color: #000; width: 100%;
            text-align: center; padding: 12px 0; font-weight: 900; font-size: 1.1rem;
        }

        .instruction-box {
            background: rgba(57, 255, 20, 0.1); border: 1px solid var(--neon);
            padding: 10px; margin: 10px; border-radius: 10px; color: var(--neon);
            font-weight: bold; text-align: center; font-size: 0.85rem;
        }

        #game-area {
            position: relative;
            width: 90vw; height: 50vh; 
            background: #fff url('image_56b09e.jpg') no-repeat center; /* මෙහි නම වෙනස් කළේ නැත */
            background-size: contain;
            border: 3px solid #444; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ඇස තැබිය යුතු නිවැරදි ස්ථානය */
        #target {
            position: absolute;
            width: 15px; height: 15px;
            background: rgba(255, 0, 0, 0.4);
            border-radius: 50%;
            top: 30.5%; left: 71.5%; /* අලියාගේ ඇස ඇති තැන */
            border: 2px dashed red;
            transform: translate(-50%, -50%);
        }

        #eye-cursor {
            position: absolute;
            width: 35px; height: 35px;
            background: url('https://cdn-icons-png.flaticon.com/512/595/595053.png') no-repeat center;
            background-size: contain;
            pointer-events: none; z-index: 100; display: none;
        }

        .status { margin-top: 15px; font-weight: bold; color: var(--gold); font-size: 1rem; }
        #webcam { display: none; }
        
        button {
            margin-top: 15px; padding: 12px 30px; background: var(--neon);
            border: none; border-radius: 25px; font-weight: bold; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div class="main-header">🌸 කීමේ බක්මහ උළෙල - 2026 🌸</div>
    
    <div class="instruction-box">
        ඔබේ සිනහව වගේම ඇස් පෙනීමත් හොඳද? <br>
        දබර ඇඟිල්ලෙන් ඇස ගෙන ගොස් අලියාට තබන්න!
    </div>

    <div id="game-area">
        <div id="target"></div>
        <div id="eye-cursor"></div>
        <video id="webcam"></video>
    </div>

    <div class="status" id="msg">කැමරාව සූදානම් වෙමින්...</div>
    <button id="res" onclick="location.reload()">නැවත උත්සාහ කරන්න 🔄</button>

    <script type="module">
        const eye = document.getElementById('eye-cursor');
        const target = document.getElementById('target');
        const msg = document.getElementById('msg');
        const area = document.getElementById('game-area');
        const resBtn = document.getElementById('res');

        let hitCount = 0;
        let isDone = false;

        function onResults(results) {
            if (isDone) return;
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                eye.style.display = 'block';
                msg.innerText = "දැන් ඇස නිවැරදි තැනට ගෙන යන්න...";
                
                const tip = results.multiHandLandmarks[0][8]; // Index finger
                const x = (1 - tip.x) * area.offsetWidth;
                const y = tip.y * area.offsetHeight;

                eye.style.left = `${x - 17}px`;
                eye.style.top = `${y - 17}px`;

                const tx = target.offsetLeft;
                const ty = target.offsetTop;
                const d = Math.sqrt(Math.pow(x - tx, 2) + Math.pow(y - ty, 2));

                if (d < 25) {
                    hitCount++;
                    target.style.background = "rgba(57, 255, 20, 0.6)";
                    if (hitCount > 40) {
                        isDone = true;
                        msg.innerText = "🎉 සුපිරි! ඔබ ජයග්‍රහණය කළා! 🏆";
                        msg.style.color = "#39ff14";
                        resBtn.style.display = "block";
                        eye.style.display = "none";
                    }
                } else {
                    hitCount = 0;
                    target.style.background = "rgba(255, 0, 0, 0.4)";
                }
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('webcam'), {
            onFrame: async () => { await hands.send({image: document.getElementById('webcam')}); },
            width: 480, height: 640
        });
        camera.start();
    </script>
</body>
</html>
